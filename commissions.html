<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สรุปค่าคอมเซลล์ — CNK</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --new:#4472C4;        /* น้ำเงิน = ลูกค้าใหม่ 5% */
    --back:#ED7D31;       /* ส้ม = เก่ากลับมา 2.5% */
    --new-soft:#D9E1F2;
    --back-soft:#FCE4D6;
    --line:#e3e6ea;
    --ink:#222;
    --muted:#7a808a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Sarabun',sans-serif;background:#f4f6f9;color:var(--ink);padding:18px;font-size:15px}
  .wrap{max-width:1100px;margin:0 auto}
  h1{font-size:22px;font-weight:700;text-align:center;margin-bottom:4px}
  .sub{text-align:center;color:var(--muted);margin-bottom:18px;font-size:13px}

  .bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:center;
       background:#fff;padding:14px;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:16px}
  .bar label{font-weight:600;font-size:14px}
  select,input,button{font-family:inherit;font-size:14px;padding:8px 12px;border:1px solid var(--line);border-radius:8px;background:#fff}
  input[type=text]{min-width:200px}
  button{cursor:pointer;font-weight:600}
  .btn-load{background:#2d3748;color:#fff;border:none}
  .btn-save{background:#16a34a;color:#fff;border:none}
  .btn-csv{background:#0d9488;color:#fff;border:none}
  .btn-pdf{background:#4472C4;color:#fff;border:none}
  .btn-load:hover{background:#1a202c}
  .btn-save:hover{background:#15803d}
  .btn-csv:hover{background:#0b7c72}
  .btn-pdf:hover{background:#365a9e}
  .btn-save:disabled,.btn-csv:disabled,.btn-pdf:disabled{background:#9ca3af;cursor:not-allowed}

  /* summary cards */
  .summary{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-bottom:18px}
  .card{flex:1;min-width:160px;background:#fff;border-radius:12px;padding:16px;text-align:center;
        box-shadow:0 1px 4px rgba(0,0,0,.06);border-top:4px solid var(--line)}
  .card.new{border-top-color:var(--new)}
  .card.back{border-top-color:var(--back)}
  .card.total{border-top-color:#16a34a}
  .card .num{font-size:30px;font-weight:700;line-height:1.1}
  .card.new .num{color:var(--new)}
  .card.back .num{color:var(--back)}
  .card.total .num{color:#16a34a}
  .card .lbl{font-size:13px;color:var(--muted);margin-top:4px}

  /* table */
  .tablebox{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
  table{width:100%;border-collapse:collapse}
  th{background:#2d3748;color:#fff;font-weight:600;font-size:13px;padding:11px 10px;text-align:left}
  td{padding:9px 10px;border-bottom:1px solid var(--line);font-size:14px;vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tr.r-new{background:var(--new-soft)}
  tr.r-back{background:var(--back-soft)}
  .num-cell{text-align:right;font-variant-numeric:tabular-nums}
  td select{padding:5px 8px;font-size:13px;border-radius:6px}
  .commission-val{font-weight:700;text-align:right;font-variant-numeric:tabular-nums}

  .empty{text-align:center;padding:40px;color:var(--muted)}
  .loading{text-align:center;padding:40px;color:var(--muted)}
  .badge{display:inline-block;font-size:11px;padding:2px 7px;border-radius:10px;font-weight:600}
  .badge.auto{background:var(--new-soft);color:var(--new)}
  .foot{margin-top:14px;text-align:center}
  .msg{margin-top:10px;text-align:center;font-size:13px;min-height:18px}
  .msg.ok{color:#16a34a}
  .msg.err{color:#dc2626}
</style>
</head>
<body>
<div class="wrap">
  <h1>สรุปรายการค่าคอมเซลล์</h1>
  <div class="sub">ดึงบิลจากระบบ → เลือกเรทค่าคอมรายบิล → บันทึกเก็บประวัติ</div>

  <div class="bar">
    <label>เดือน</label>
    <input type="month" id="month">
    <label>เซลล์</label>
    <input type="text" id="salesName" placeholder="ชื่อเซลล์">
    <button class="btn-load" onclick="loadBills()">โหลดบิล</button>
    <input type="text" id="search" placeholder="🔍 ค้นหาลูกค้า..." oninput="filterRows()">
  </div>

  <div class="summary">
    <div class="card new"><div class="num" id="cntNew">0</div><div class="lbl">ลูกค้าใหม่ (5%)</div></div>
    <div class="card back"><div class="num" id="cntBack">0</div><div class="lbl">เก่ากลับมา (2.5%)</div></div>
    <div class="card total"><div class="num" id="cntTotal">0</div><div class="lbl">ค่าคอมรวม (บาท)</div></div>
  </div>

  <div class="tablebox">
    <table>
      <thead>
        <tr>
          <th style="width:90px">วันที่</th>
          <th style="width:110px">เลขบิล</th>
          <th>ลูกค้า</th>
          <th style="width:120px" class="num-cell">ยอดเงิน</th>
          <th style="width:170px">เรทค่าคอม</th>
          <th style="width:110px" class="num-cell">ค่าคอม</th>
        </tr>
      </thead>
      <tbody id="rows">
        <tr><td colspan="6" class="empty">เลือกเดือนแล้วกด "โหลดบิล"</td></tr>
      </tbody>
    </table>
  </div>

  <div class="foot">
    <button class="btn-save" id="saveBtn" onclick="save()" disabled>💾 บันทึกค่าคอมเดือนนี้</button>
    <button class="btn-csv" id="csvBtn" onclick="exportCSV()" disabled>📄 Export CSV</button>
    <button class="btn-pdf" id="pdfBtn" onclick="exportPDF()" disabled>🖨️ ปริ้น / PDF</button>
    <div class="msg" id="msg"></div>
  </div>
</div>

<script>
  // ====== ตั้งค่า ======
  const API = "https://script.google.com/macros/s/AKfycbzFPMqVCZ783-LIyxbDjqxroE-VpP8gIVPYh7uTeTAoYReKKmnjdMz5C5lvI3_FMPgT/exec";
  const RATES = { none:0, new:0.05, back:0.025 };

  let bills = [];          // บิลที่โหลดมา
  let loyalNew = new Set(); // ชื่อลูกค้าที่เคยตั้ง 5% มาก่อน (ได้ 5% ตลอด)

  // default เดือนปัจจุบัน
  document.getElementById('month').value = new Date().toISOString().slice(0,7);

  function fmt(n){ return Number(n||0).toLocaleString('th-TH',{minimumFractionDigits:0,maximumFractionDigits:2}); }

  async function loadBills(){
    const month = document.getElementById('month').value;
    if(!month){ alert('เลือกเดือนก่อน'); return; }
    document.getElementById('rows').innerHTML = '<tr><td colspan="6" class="loading">กำลังโหลด...</td></tr>';
    document.getElementById('saveBtn').disabled = true;
    document.getElementById('csvBtn').disabled = true;
    document.getElementById('pdfBtn').disabled = true;
    setMsg('','');

    try{
      // ดึงบิลของเดือน + ลูกค้าที่เคยเป็น 5% มาก่อน (พร้อมกัน)
      const [billRes, loyalRes] = await Promise.all([
        fetch(`${API}?action=getMonthBills&month=${month}`).then(r=>r.json()),
        fetch(`${API}?action=getLoyalNewCustomers`).then(r=>r.json())
      ]);

      loyalNew = new Set((loyalRes.customers||[]).map(s=>String(s).trim()));
      bills = (billRes.bills||[]).map(b=>{
        // default เรท: ถ้าลูกค้าเคยเป็น 5% → ตั้ง new ให้อัตโนมัติ
        const isLoyal = loyalNew.has(String(b.cn||'').trim());
        return { ...b, rate: isLoyal ? 'new' : 'none', auto: isLoyal };
      });
      render();
    }catch(e){
      document.getElementById('rows').innerHTML = `<tr><td colspan="6" class="empty">โหลดไม่สำเร็จ: ${e.message}</td></tr>`;
    }
  }

  function render(){
    const tb = document.getElementById('rows');
    if(!bills.length){
      tb.innerHTML = '<tr><td colspan="6" class="empty">ไม่มีบิลในเดือนนี้</td></tr>';
      recalc(); return;
    }
    tb.innerHTML = bills.map((b,i)=>`
      <tr data-i="${i}" class="${b.rate==='new'?'r-new':b.rate==='back'?'r-back':''}">
        <td>${b.date||''}</td>
        <td>${b.no||''}</td>
        <td>${b.cn||''} ${b.auto?'<span class="badge auto">5% อัตโนมัติ</span>':''}</td>
        <td class="num-cell">${fmt(b.grand)}</td>
        <td>
          <select onchange="setRate(${i}, this.value)">
            <option value="none" ${b.rate==='none'?'selected':''}>ไม่คิดคอม</option>
            <option value="new"  ${b.rate==='new'?'selected':''}>5% — ลูกค้าใหม่</option>
            <option value="back" ${b.rate==='back'?'selected':''}>2.5% — เก่ากลับมา</option>
          </select>
        </td>
        <td class="commission-val">${fmt(Number(b.grand||0)*RATES[b.rate])}</td>
      </tr>`).join('');
    recalc();
    document.getElementById('saveBtn').disabled = false;
    document.getElementById('csvBtn').disabled = false;
    document.getElementById('pdfBtn').disabled = false;
  }

  function setRate(i, rate){
    bills[i].rate = rate;
    bills[i].auto = false; // แก้เองแล้วเอา badge ออก
    render();
    filterRows();
  }

  function recalc(){
    let cN=0, cB=0, total=0;
    bills.forEach(b=>{
      const c = Number(b.grand||0)*RATES[b.rate];
      total += c;
      if(b.rate==='new') cN++;
      if(b.rate==='back') cB++;
    });
    document.getElementById('cntNew').textContent = cN;
    document.getElementById('cntBack').textContent = cB;
    document.getElementById('cntTotal').textContent = fmt(total);
  }

  function filterRows(){
    const q = document.getElementById('search').value.trim().toLowerCase();
    document.querySelectorAll('#rows tr[data-i]').forEach(tr=>{
      const i = tr.dataset.i;
      const name = String(bills[i].cn||'').toLowerCase();
      tr.style.display = (!q || name.includes(q)) ? '' : 'none';
    });
  }

  async function save(){
    const month = document.getElementById('month').value;
    const salesName = document.getElementById('salesName').value.trim();
    const rows = bills
      .filter(b=>b.rate!=='none')
      .map(b=>({
        month, billId:b.id, billNo:b.no, custName:b.cn,
        amount:Number(b.grand||0), rate:RATES[b.rate],
        commission:Number(b.grand||0)*RATES[b.rate],
        rateType:b.rate, salesName
      }));

    if(!rows.length){ setMsg('ยังไม่ได้เลือกเรทค่าคอมเลย','err'); return; }

    document.getElementById('saveBtn').disabled = true;
    setMsg('กำลังบันทึก...','');
    try{
      const payload = JSON.stringify({ month, salesName, rows });
      const res = await fetch(`${API}?action=saveCommissions&data=${encodeURIComponent(payload)}`)
        .then(r=>r.json());
      if(res.success){ setMsg(`บันทึกแล้ว ${res.saved} รายการ ✓`,'ok'); }
      else { setMsg('บันทึกไม่สำเร็จ: '+(res.error||''),'err'); }
    }catch(e){
      setMsg('บันทึกไม่สำเร็จ: '+e.message,'err');
    }
    document.getElementById('saveBtn').disabled = false;
  }

  // ===== EXPORT =====
  function picked(){ return bills.filter(b=>b.rate!=='none'); }
  function rateLabel(r){ return r==='new'?'5% (ลูกค้าใหม่)':r==='back'?'2.5% (เก่ากลับมา)':'-'; }
  function totals(){
    let cN=0,cB=0,total=0;
    picked().forEach(b=>{ const c=Number(b.grand||0)*RATES[b.rate]; total+=c; if(b.rate==='new')cN++; if(b.rate==='back')cB++; });
    return {cN,cB,total};
  }
  function monthLabel(){
    const [y,m] = document.getElementById('month').value.split('-');
    const TH=['','มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
    return `${TH[parseInt(m,10)]} ${parseInt(y,10)+543}`;
  }

  function exportCSV(){
    const rows = picked();
    if(!rows.length){ setMsg('ยังไม่ได้เลือกเรทค่าคอมเลย','err'); return; }
    const sales = document.getElementById('salesName').value.trim();
    const head = ['วันที่','เลขบิล','ลูกค้า','ยอดเงิน','เรทค่าคอม','ค่าคอม'];
    const lines = [head.join(',')];
    rows.forEach(b=>{
      const c = Number(b.grand||0)*RATES[b.rate];
      lines.push([
        b.date, b.no, `"${(b.cn||'').replace(/"/g,'""')}"`,
        Number(b.grand||0), rateLabel(b.rate).replace(/,/g,''), c.toFixed(2)
      ].join(','));
    });
    const t = totals();
    lines.push('');
    lines.push(`,,,ลูกค้าใหม่,${t.cN} คน,`);
    lines.push(`,,,เก่ากลับมา,${t.cB} คน,`);
    lines.push(`,,,,ค่าคอมรวม,${t.total.toFixed(2)}`);

    const blob = new Blob(["\uFEFF"+lines.join('\n')], {type:'text/csv;charset=utf-8;'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `ค่าคอม_${sales||'เซลล์'}_${document.getElementById('month').value}.csv`;
    a.click();
  }

  function exportPDF(){
    const rows = picked();
    if(!rows.length){ setMsg('ยังไม่ได้เลือกเรทค่าคอมเลย','err'); return; }
    const sales = document.getElementById('salesName').value.trim();
    const t = totals();
    const tr = rows.map(b=>{
      const c = Number(b.grand||0)*RATES[b.rate];
      const cls = b.rate==='new'?'pn':'pb';
      return `<tr class="${cls}"><td>${b.date||''}</td><td>${b.no||''}</td><td>${b.cn||''}</td>
        <td class="r">${fmt(b.grand)}</td><td>${rateLabel(b.rate)}</td><td class="r">${fmt(c)}</td></tr>`;
    }).join('');

    const html = `<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8">
      <title>ค่าคอม ${monthLabel()}</title>
      <style>
        @page{size:A4;margin:18mm}
        body{font-family:'Sarabun','TH Sarabun New',sans-serif;color:#222}
        h1{text-align:center;font-size:22px;margin:0 0 4px}
        .sub{text-align:center;color:#555;margin-bottom:18px;font-size:14px}
        .cards{display:flex;gap:12px;justify-content:center;margin-bottom:18px}
        .c{flex:1;border:1px solid #ddd;border-radius:8px;padding:10px;text-align:center}
        .c .n{font-size:24px;font-weight:700}
        .c.n1 .n{color:#4472C4} .c.n2 .n{color:#ED7D31} .c.n3 .n{color:#16a34a}
        .c .l{font-size:12px;color:#666}
        table{width:100%;border-collapse:collapse;font-size:13px}
        th{background:#2d3748;color:#fff;padding:8px;text-align:left}
        td{padding:7px 8px;border-bottom:1px solid #e3e6ea}
        .r{text-align:right}
        tr.pn{background:#D9E1F2} tr.pb{background:#FCE4D6}
        tfoot td{font-weight:700;border-top:2px solid #2d3748}
      </style></head><body>
      <h1>สรุปรายการค่าคอมเซลล์</h1>
      <div class="sub">ประจำเดือน ${monthLabel()}${sales?' &nbsp;|&nbsp; เซลล์: '+sales:''}</div>
      <div class="cards">
        <div class="c n1"><div class="n">${t.cN}</div><div class="l">ลูกค้าใหม่ (5%)</div></div>
        <div class="c n2"><div class="n">${t.cB}</div><div class="l">เก่ากลับมา (2.5%)</div></div>
        <div class="c n3"><div class="n">${fmt(t.total)}</div><div class="l">ค่าคอมรวม (บาท)</div></div>
      </div>
      <table>
        <thead><tr><th>วันที่</th><th>เลขบิล</th><th>ลูกค้า</th><th class="r">ยอดเงิน</th><th>เรทค่าคอม</th><th class="r">ค่าคอม</th></tr></thead>
        <tbody>${tr}</tbody>
        <tfoot><tr><td colspan="5" class="r">ค่าคอมรวม</td><td class="r">${fmt(t.total)} บาท</td></tr></tfoot>
      </table>
      <script>window.onload=function(){window.print();}<\/script>
      </body></html>`;

    const w = window.open('', '_blank');
    w.document.write(html);
    w.document.close();
  }


    const m = document.getElementById('msg');
    m.textContent = t; m.className = 'msg '+(cls||'');
  }
</script>
</body>
</html>
